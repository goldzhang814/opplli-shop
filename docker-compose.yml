version: "3.9"

services:
  # ── FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "9010:9010"
    volumes:
      - ./backend:/app
      - media_local:/app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ✅ 访问宿主机 MySQL/Redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 9010

  # ── Celery Worker ───────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - media_local:/app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ✅ 访问宿主机 Redis
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  # ── Celery Beat ─────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ✅ 访问宿主机 Redis
    command: celery -A app.core.celery_app beat --loglevel=info

  # ── Nuxt 3 ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ✅ NUXT_PUBLIC_* 必须构建时注入，运行时改了无效
        NUXT_PUBLIC_API_BASE: ""
        NUXT_PUBLIC_SITE_URL: https://www.opplii.com
        NUXT_PUBLIC_STRIPE_KEY: ${NUXT_PUBLIC_STRIPE_KEY:-}
        NUXT_PUBLIC_AIRWALLEX_KEY: ${NUXT_PUBLIC_AIRWALLEX_KEY:-}
        NUXT_PUBLIC_AIRWALLEX_ENV: ${NUXT_PUBLIC_AIRWALLEX_ENV:-production}
    container_name: ecom_frontend
    restart: unless-stopped
    ports:
      - "9001:3000"
    depends_on:
      - api
    environment:
      # ✅ SSR 服务端走容器内网访问 api，用 service name
      - API_BASE_URL=http://api:9010
      - NODE_ENV=production

  # ── Vue 3 Admin ─────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api           # ✅ 同样构建时注入
    container_name: ecom_admin
    restart: unless-stopped
    ports:
      - "9002:9002"
    depends_on:
      - api

volumes:
  media_local:
  # ✅ 删掉 mysql_data 和 redis_data，用宿主机的